<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المدير | محطات التوزيع</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--blue-deep:#1B4D8C;--blue-mid:#2E7DD1;--teal:#1FAE8C;--teal-light:#4DD6B5;}
[data-theme="dark"]{--bg:#0A1420;--bg-elev:#101D2E;--bg-card:#0D1826;--text-primary:#EAF1F7;--text-secondary:#8FA3B8;--border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.16);}
[data-theme="light"]{--bg:#EAF1F6;--bg-elev:#F4F8FB;--bg-card:#FFFFFF;--text-primary:#102035;--text-secondary:#52647A;--border:rgba(16,32,53,0.10);--border-strong:rgba(16,32,53,0.20);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;padding-bottom:48px;transition:background .3s,color .3s;}
header{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border);display:flex;flex-direction:column;}
.header-row-main{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 28px;}
@media (max-width:600px){.header-row-main{padding:12px 14px;}}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.brand-mark{
  height:38px;width:auto;flex-shrink:0;display:block;object-fit:contain;
  transition:transform .2s;
}
.brand-text{font-size:14.5px;font-weight:700;letter-spacing:.2px;white-space:nowrap;transition:color .2s;}
.brand:hover .brand-mark{transform:scale(1.06);}
.brand:hover .brand-text{color:var(--teal);}
.brand-sub{font-size:11px;color:var(--text-secondary);}
.header-actions{display:flex;align-items:center;gap:8px;}
.mobile-user-menu{display:block;position:relative;}
.mobile-menu-trigger{
  display:flex;align-items:center;gap:6px;
  background:var(--bg-card);border:1px solid var(--border-strong);border-radius:22px;
  padding:9px 16px;font-size:13px;font-weight:600;color:var(--text-primary);
  cursor:pointer;font-family:inherit;
}
.mobile-menu-trigger:hover{border-color:var(--teal);}
.mobile-menu-trigger svg{transition:transform .2s;flex-shrink:0;}
.mobile-user-menu.open .mobile-menu-trigger svg{transform:rotate(180deg);}
.mobile-menu-panel{
  position:absolute;top:calc(100% + 8px);left:0;
  background:var(--bg-card);border:1px solid var(--border-strong);border-radius:14px;
  min-width:215px;box-shadow:0 10px 28px rgba(0,0,0,.35);
  padding:6px;display:none;z-index:60;
}
.mobile-user-menu.open .mobile-menu-panel{display:block;}
.mobile-menu-row{display:flex;align-items:center;gap:10px;padding:10px 10px;font-size:12.5px;color:var(--text-primary);border-bottom:1px solid var(--border);margin-bottom:4px;}
.mobile-menu-link{
  display:flex;align-items:center;gap:10px;
  padding:10px 10px;font-size:12.5px;color:var(--text-primary);
  text-decoration:none;border-radius:9px;border:1px solid transparent;transition:.15s;
  margin-bottom:2px;
}
.mobile-menu-link:hover{background:var(--bg-elev);}
.mobile-menu-link.current-page{
  background:rgba(31,174,140,0.12);border-color:rgba(31,174,140,0.4);
  color:var(--teal-light);font-weight:700;
}
.menu-icon{display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mobile-menu-logout{
  display:flex;align-items:center;gap:10px;width:100%;
  text-align:right;padding:10px 10px;font-size:12.5px;color:#E0654F;
  background:transparent;border:none;border-top:1px solid var(--border);margin-top:4px;
  cursor:pointer;font-family:inherit;border-radius:8px;transition:.15s;
}
.mobile-menu-logout:hover{background:rgba(224,101,79,0.1);}
.theme-switch{
  width:42px;height:23px;border-radius:12px;position:relative;flex-shrink:0;
  background:var(--border-strong);border:none;cursor:pointer;transition:background .2s;padding:0;
}
.theme-switch.on{background:var(--teal);}
.theme-switch-knob{
  position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;
  background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.theme-switch.on .theme-switch-knob{transform:translateX(19px);}
.content{max-width:1000px;margin:0 auto;padding:28px 20px;}
.page-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--text-secondary);margin-bottom:24px;}
.loading-overlay{display:flex;align-items:center;justify-content:center;height:240px;color:var(--text-secondary);font-size:13px;gap:8px;}
.spinner{width:18px;height:18px;border:2px solid var(--border-strong);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.err-msg{text-align:center;color:#E0654F;font-size:13px;padding:40px;background:var(--bg-card);border-radius:8px;}
.status-refresh-btn{
  display:flex;align-items:center;justify-content:center;
  width:20px;height:20px;flex-shrink:0;margin-right:auto;
  background:transparent;border:none;border-radius:50%;
  color:var(--text-secondary);cursor:pointer;transition:.2s;
}
.status-refresh-btn:hover{background:rgba(31,174,140,0.14);color:var(--teal);}

/* ===== غرفة العمليات — Phase 2 (الواجهة) ===== */
/* ===== Operations room — Phase 2 (frontend) ===== */
.alert-strip{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;margin-bottom:16px;}
.alert-chip{
  flex-shrink:0;display:flex;align-items:center;gap:6px;
  background:rgba(224,101,79,.12);border:1px solid rgba(224,101,79,.35);color:#E0654F;
  font-size:11.5px;font-weight:600;padding:7px 13px;border-radius:20px;white-space:nowrap;
}
.ops-status-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
  padding:18px 20px;margin-bottom:14px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
}
.ops-status-ring{flex-shrink:0;}
.ops-status-info{flex:1;min-width:180px;}
.ops-status-title{font-size:13.5px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:7px;}
.ops-status-sub{font-size:11.5px;color:var(--text-secondary);margin-top:3px;}
.ops-status-count-line{font-size:13px;color:var(--text-secondary);display:flex;align-items:baseline;gap:5px;}
.ops-status-count{font-size:21px;font-weight:800;color:var(--teal);font-family:'JetBrains Mono',monospace;}
.ops-breakdown-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:16px;
  padding:18px;margin-top:12px;
}
.ops-breakdown-title{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text-secondary);}
.ops-breakdown-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 4px;border-top:1px solid var(--border);font-size:13px;
}
.ops-breakdown-row:first-of-type{border-top:none;}
.ops-breakdown-row b{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--teal);}
.ops-row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.ops-pill{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;}
.ops-pill b{display:block;font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;margin-bottom:3px;}
.ops-pill span{font-size:11px;color:var(--text-secondary);}
.acc-item{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.acc-head{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:14px 16px;cursor:pointer;user-select:none;
}
.acc-head-title{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;}
.acc-head-badge{font-size:11px;color:var(--text-secondary);}
.acc-chev{transition:transform .25s;color:var(--text-secondary);flex-shrink:0;}
.acc-item.open .acc-chev{transform:rotate(180deg);}
.acc-body{max-height:0;overflow:hidden;transition:max-height .3s ease;}
.acc-item.open .acc-body{max-height:600px;}
.acc-body-inner{padding:0 16px 16px;font-size:12.5px;color:var(--text-secondary);}
.acc-body-inner table{width:100%;border-collapse:collapse;font-size:12px;}
.acc-body-inner th{background:var(--bg-elev);color:var(--text-primary);font-weight:700;font-size:12px;text-align:center;padding:8px 6px;border-radius:6px 6px 0 0;}
.acc-body-inner td{text-align:center;padding:7px 6px;border-bottom:1px solid var(--border);color:var(--text-primary);}
.coming-soon{text-align:center;padding:24px 10px;color:var(--text-secondary);font-size:12px;}
.chart-box{position:relative;height:200px;}
.heatmap-grid{display:grid;grid-template-columns:34px repeat(24,1fr);gap:2px;font-size:8.5px;color:var(--text-secondary);}
.heatmap-cell{aspect-ratio:1;border-radius:3px;}
.heatmap-label{display:flex;align-items:center;justify-content:flex-end;padding-left:4px;font-size:9px;}
.heatmap-peak-note{margin-top:10px;font-size:11.5px;color:var(--text-primary);text-align:center;}
.region-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.region-bar-label{width:90px;flex-shrink:0;font-size:11.5px;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.region-bar-track{flex:1;height:16px;background:var(--bg-elev);border-radius:6px;overflow:hidden;}
.region-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue-mid),var(--teal));border-radius:6px;}
.region-bar-count{width:26px;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11px;text-align:center;}

/* ===== الصفحات المنبثقة الكاملة للتفاصيل — المرحلة 4 ===== */
/* ===== Full detail popup pages — Phase 4 ===== */
.detail-modal-overlay{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(2,5,8,.6);backdrop-filter:blur(2px);
  align-items:flex-end;justify-content:center;
}
.detail-modal-overlay.show{display:flex;}
.detail-modal{
  width:100%;max-width:720px;max-height:92vh;
  background:var(--bg);border-radius:20px 20px 0 0;
  display:flex;flex-direction:column;overflow:hidden;
  animation:modalSlideUp .25s ease-out;
}
@keyframes modalSlideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.detail-modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.detail-modal-title{font-size:15px;font-weight:700;}
.detail-modal-close{
  width:32px;height:32px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-primary);
}
.detail-modal-filters{padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:10px;}
.detail-filter-row{display:flex;gap:8px;flex-wrap:wrap;}
.detail-filter-row input, .detail-filter-row select{
  flex:1;min-width:120px;background:var(--bg-card);border:1px solid var(--border-strong);border-radius:10px;
  padding:9px 12px;font-size:12.5px;color:var(--text-primary);font-family:inherit;
}
.detail-hijri-note{font-size:10.5px;color:var(--text-secondary);}
.detail-filter-actions{display:flex;gap:8px;}
.detail-btn{
  flex:1;padding:9px 12px;border-radius:10px;font-size:12.5px;font-weight:600;
  border:1px solid var(--border-strong);background:var(--bg-card);color:var(--text-primary);
  cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;
}
.detail-btn.primary{background:rgba(31,174,140,.15);border-color:rgba(31,174,140,.4);color:var(--teal-light);}
.detail-btn.primary:hover{background:rgba(31,174,140,.25);}
.detail-modal-body{flex:1;overflow-y:auto;padding:14px 18px 24px;}
.detail-modal-body table{width:100%;border-collapse:collapse;font-size:12px;}
.detail-modal-body th{background:var(--bg-elev);color:var(--text-primary);font-weight:700;font-size:12px;text-align:center;padding:9px 6px;position:sticky;top:0;}
.detail-modal-body td{text-align:center;padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text-primary);font-size:12px;}
.detail-count-badge{font-size:11.5px;color:var(--text-secondary);margin-bottom:10px;}
.detail-preview-link{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:8px;padding:9px;border-radius:10px;background:var(--bg-elev);
  color:var(--teal-light);font-size:12px;font-weight:600;cursor:pointer;border:1px dashed var(--border-strong);
}
/* شريط حالة الاتصال + آخر تحديث — جزء بنيوي فعلي من الهيدر، لا عنصر شقيق منفصل / Connection status bar — structural part of header, not a separate sibling */
.header-row-status{
  padding:0 28px 12px;font-size:11px;color:var(--text-secondary);
}
.conn-status-pill{
  display:flex;align-items:center;gap:14px;width:100%;
  border:1px solid var(--border-strong);border-radius:14px;
  padding:9px 16px;background:var(--bg-card);color:var(--text-primary);
}
.status-bar-item{display:flex;align-items:center;gap:6px;}
.conn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#8FA3B8;transition:background .3s;}
.conn-dot.checking{background:#C8A24E;box-shadow:0 0 6px rgba(200,162,78,.6);}
.conn-dot.online{background:#2ECC71;box-shadow:0 0 6px rgba(46,204,113,.6);}
.conn-dot.offline{background:#E0654F;box-shadow:0 0 6px rgba(224,101,79,.6);}
@media(max-width:600px){.header-row-status{padding:0 12px 10px;}.conn-status-pill{padding:8px 12px;font-size:10.5px;gap:10px;flex-wrap:wrap;}}
@media(max-width:600px){
  .content{padding:16px 12px;}
}
/* ===== نافذة مراسلة المدير (اتصال/واتساب/إيميل) — نفس نموذج صفحة التسجيل ===== */
/* Contact-admin modal (call/WhatsApp/email) — same model as the registration page */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;}
.input-base{width:100%;height:44px;background:var(--bg);border:1px solid var(--border-strong);border-radius:10px;color:var(--text-primary);font-family:inherit;font-size:14px;padding:0 14px;outline:none;}
.input-base:focus{border-color:var(--teal);}
.error-banner{background:rgba(224,101,79,0.1);color:#E0654F;font-size:12.5px;padding:10px 12px;border-radius:8px;margin-bottom:14px;display:none;}
.error-banner.show{display:block;}
.contact-modal-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(6,10,16,0.75);align-items:center;justify-content:center;padding:20px;overflow-y:auto;
}
.contact-modal-overlay.show{display:flex;}
.contact-modal-card{
  width:min(440px, 100%);background:var(--bg-card);border:1px solid var(--border-strong);
  border-radius:20px;padding:26px;box-shadow:0 20px 50px rgba(0,0,0,.4);max-height:90vh;overflow-y:auto;
}
.contact-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.contact-modal-header h2{font-size:17px;font-weight:800;margin:0;}
.contact-modal-close{
  width:34px;height:34px;border-radius:50%;background:var(--bg);border:1px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-primary);transition:.2s;flex-shrink:0;
}
.contact-modal-close:hover{border-color:var(--teal);color:var(--teal);}
.contact-type-btn{
  flex:1;height:42px;border-radius:10px;border:1px solid var(--border-strong);background:var(--bg);
  color:var(--text-primary);font-family:inherit;font-size:13px;cursor:pointer;transition:.2s;
}
.contact-type-btn.active{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:700;}
.contact-send-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  height:48px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:700;
  cursor:pointer;transition:.2s;
}
.contact-send-whatsapp{background:#25D366;color:#04341c;}
.contact-send-whatsapp:hover{background:#1ebc59;}
.contact-send-email{background:#fff;color:#3c4043;border:1px solid #dadce0;}
.contact-send-email:hover{background:#f8f9fa;}
</style>
</head>
<body data-theme="dark" id="bodyEl">
<script>
(function(){
  var t = localStorage.getItem('sec-theme');
  if(t==='light'||t==='dark') document.getElementById('bodyEl').setAttribute('data-theme',t);
  var s = localStorage.getItem('sec-session');
  if(!s){ location.href='auth.html'; return; }
  try{
    var session = JSON.parse(s);
    if(session.role !== 'admin'){ location.href='index.html'; }
  }catch(e){ location.href='auth.html'; }
})();
</script>

<header>
  <div class="header-row-main">
    <div class="brand" id="brandLink" style="cursor:pointer" role="button" tabindex="0" aria-label="الرجوع للصفحة الرئيسية">
      <img class="brand-mark" src="assets/logo-icon.png" alt="شعار الشركة السعودية للطاقة">
      <div>
        <div class="brand-text">لوحة المدير</div>
        <div class="brand-sub">الشركة السعودية للطاقة — محطات التوزيع</div>
      </div>
    </div>
    <div class="header-actions" id="headerActions">
      <div class="mobile-user-menu" id="mobileUserMenu">
        <button class="mobile-menu-trigger" id="mobileMenuTrigger">
          <span id="mobileMenuName">القائمة</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div class="mobile-menu-panel" id="mobileMenuPanel">
          <div class="mobile-menu-row">
            <span class="menu-icon" style="color:#8B6DD6">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v1M12 20v1M4.2 4.2l.7.7M18.4 18.4l.7.7M3 12h1M20 12h1M4.2 19.8l.7-.7M18.4 5.6l.7-.7"/><circle cx="12" cy="12" r="4"/></svg>
            </span>
            <span style="flex:1">الوضع الداكن</span>
            <button class="theme-switch" id="themeSwitchMobile" aria-label="تبديل الوضع الداكن"><span class="theme-switch-knob"></span></button>
          </div>
          <a href="#" class="mobile-menu-link" id="menuCallAdmin">
            <span class="menu-icon" style="color:var(--teal)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
            اتصال بالمدير
          </a>
          <button type="button" class="mobile-menu-link" id="menuMessageAdmin" style="width:100%;text-align:right;background:transparent;border:1px solid transparent;font-family:inherit;cursor:pointer">
            <span class="menu-icon" style="color:#6C5CE7"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></span>
            مراسلة المدير
          </button>
          <a href="index.html" class="mobile-menu-link">
            <span class="menu-icon" style="color:#2ECC71"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg></span>
            الصفحة الرئيسية
          </a>
          <a href="member.html" class="mobile-menu-link">
            <span class="menu-icon" style="color:#4A86E8"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
            حسابي

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyxZUSLZNa6UlZLINsfAEe8CmQPoNGJbpnNtUDxP019TfL8uLh_5fuP0e5HE6daP8dh1w/exec';

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

/* ============================================================
 *  فحص حالة الاتصال بالخادم — نفس منطق index.html بالضبط
 *  Server connection health check — mirrors index.html exactly
 * ============================================================ */
async function pingBackend(){
  const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({ action:'ping' }) });
  return await res.json();
}
const connDot = document.getElementById('connDot');
const connLabel = document.getElementById('connLabel');
const statusBarEl = document.getElementById('statusBar');
const lastUpdateLabel = document.getElementById('lastUpdateLabel');
let lastSuccessfulCheckAt = null;
function formatRelativeTime(date){
  const diffSec = Math.floor((Date.now() - date.getTime()) / 1000);
  if(diffSec < 15) return 'الآن';
  if(diffSec < 60) return `قبل ${diffSec} ثانية`;
  const diffMin = Math.floor(diffSec / 60);
  if(diffMin < 60) return diffMin === 1 ? 'قبل دقيقة' : `قبل ${diffMin} دقائق`;
  const diffHour = Math.floor(diffMin / 60);
  return diffHour === 1 ? 'قبل ساعة' : `قبل ${diffHour} ساعات`;
}
function refreshLastUpdateLabel(){
  lastUpdateLabel.textContent = lastSuccessfulCheckAt ? `آخر تحديث: ${formatRelativeTime(lastSuccessfulCheckAt)}` : 'آخر تحديث: —';
}
setInterval(refreshLastUpdateLabel, 30 * 1000);
async function checkConnection(){
  connDot.className = 'conn-dot checking';
  connLabel.textContent = 'جاري الاتصال...';
  try{
    const res = await Promise.race([
      pingBackend(),
      new Promise((_, reject)=> setTimeout(()=> reject(new Error('timeout')), 15000))
    ]);
    if(res && res.success){
      connDot.className = 'conn-dot online';
      connLabel.textContent = 'متصل';
      lastSuccessfulCheckAt = new Date();
      refreshLastUpdateLabel();
    } else { throw new Error('backend-error'); }
  }catch(err){
    connDot.className = 'conn-dot offline';
    connLabel.textContent = 'بدون اتصال';
  }
}
function renderHeaderDate(){
  const el = document.getElementById('headerDateLine');
  if(el) el.textContent = new Date().toLocaleDateString('ar-SA-u-ca-gregory-nu-latn', {day:'numeric', month:'long', year:'numeric'});
}
renderHeaderDate();
setInterval(renderHeaderDate, 60 * 60 * 1000);
setTimeout(checkConnection, 1500);
setInterval(()=>{ if(document.visibilityState === 'visible') checkConnection(); }, 3 * 60 * 1000);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') checkConnection(); });
const session = JSON.parse(localStorage.getItem('sec-session') || '{}');

document.getElementById('sendWhatsappBtn').addEventListener('click', ()=>{

/* ============================================================
 *  غرفة العمليات — Phase 2 (الواجهة)

/* لون المؤشر حسب النسبة ونوعه: quota (الأعلى أسوأ) أو quality (الأعلى أفضل) */
/* Indicator color by percentage and type: quota (higher = worse) or quality (higher = better) */
function gaugeColor(pct, type){
  const isGood = type === 'quality' ? pct >= 90 : pct <= 60;
  const isWarn = type === 'quality' ? (pct >= 70 && pct < 90) : (pct > 60 && pct <= 85);
  if(isGood) return '#2ECC71';
  if(isWarn) return '#C8A24E';
  return '#E0654F';
}
/* مؤشر دائري تفاعلي — يتغيّر لونه فعليًا حسب النسبة، لا لون ثابت واحد / Interactive ring gauge — color genuinely changes with the percentage, not a single fixed color */
function renderRing(pct, type, size){
  const color = gaugeColor(pct, type);
  const r = (size/2) - 7;
  const c = 2*Math.PI*r;
  const offset = c - (Math.min(100,Math.max(0,pct))/100)*c;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border-strong)" stroke-width="7"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="7"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .6s ease, stroke .4s ease"/>
    <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" font-size="${Math.round(size*0.2)}" font-weight="800" fill="${color}" font-family="'JetBrains Mono',monospace">${pct}%</text>
  </svg>`;
}

const ALERT_CATEGORY_ICON = {
  'فشل تحديث بيانات': '⚠️',
  'محاولة دخول خاطئة': '🔒',
  'مشاكل اتصال': '📡',
  'تنبيهات': 'ℹ️'
};

function renderAlertStrip(alertsSummary){
  const chips = Object.keys(alertsSummary)
    .filter(cat => alertsSummary[cat] > 0)
    .map(cat => `<div class="alert-chip">${ALERT_CATEGORY_ICON[cat]||'⚠️'} ${alertsSummary[cat]} ${escapeHtml(cat)}</div>`)
    .join('');
  const strip = document.getElementById('alertStrip');
  if(chips){
    strip.innerHTML = chips;
    strip.style.display = 'flex';
  } else {
    strip.style.display = 'none';
  }
}

function renderOpsMain(d){
  const quotaPct = Math.min(100, Math.round((d.dailyRequests / d.dailyRequestLimit) * 100));
  const qualityPct = d.dataQualityPct;

  /* ترجمة أسماء الإجراءات التقنية لتسميات عربية مفهومة بالعرض — لا تُخزَّن بالكود كبيانات عمل، فقط تسميات عرض ثابتة لواجهة تقنية / Technical action names translated to readable Arabic labels for display — not business data, just fixed display labels for a technical interface */
  const ACTION_LABELS = {
    'ping': 'فحص الاتصال', 'searchStation': 'بحث بالخادم (احتياطي)', 'getAllStations': 'تحميل فهرس المحطات',
    'getDataVersion': 'فحص إصدار البيانات', 'updateCoordinates': 'تعديل إحداثية', 'addNewStation': 'إضافة محطة',

/* فتح/طي الأقسام — وتحميل المعاينات المصغّرة كسلًا فقط عند أول فتح لكل قسم / Accordion open/close — lazy-loads compact previews only on first open */
let presentLoaded = false, additionsLoaded = false, editsLoaded = false, chartsLoaded = false, peakLoaded = false, regionsLoaded = false;
function wireAccordion(){
  document.querySelectorAll('.acc-head').forEach(head=>{
    const toggle = ()=>{
      const item = head.closest('.acc-item');
      const wasOpen = item.classList.contains('open');
      document.querySelectorAll('.acc-item.open').forEach(el=> el.classList.remove('open'));
      if(!wasOpen){
        item.classList.add('open');
        const section = item.dataset.section;
        if(section === 'present' && !presentLoaded) loadPresentPreview();
        if(section === 'additions' && !additionsLoaded) loadAdditionsPreview();
        if(section === 'edits' && !editsLoaded) loadEditsPreview();
        if(section === 'charts' && !chartsLoaded) loadVisitorsChart();
        if(section === 'peak' && !peakLoaded) loadPeakHeatmap();
        if(section === 'regions' && !regionsLoaded) loadRegionActivity();
      }
    };
    head.addEventListener('click', toggle);
    head.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggle(); }
    });
  });
}

const DETAIL_MODAL_CONFIG = {
  present:   { title:'👥 المتواجدون — التفاصيل الكاملة',  columns:['الاسم','الجوال','الوردية','آخر نشاط'] },
  additions: { title:'+ الإضافات — التفاصيل الكاملة',      columns:['المحطة','العضو','الجوال','الوردية','التاريخ','الوقت'] },
  edits:     { title:'✎ التعديلات — التفاصيل الكاملة',     columns:['المحطة','العضو','الجوال','الوردية','التاريخ','الوقت'] }
};

/* تحويل تاريخ ميلادي لهجري للعرض فقط — بدون مكتبة خارجية، عبر واجهة المتصفح القياسية / Gregorian→Hijri display only, via the browser's built-in API, no external library */
const hijriFormatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura-nu-latn', {day:'numeric', month:'long', year:'numeric'});
function hijriOf(dateStr){
  try{ return hijriFormatter.format(new Date(dateStr + 'T00:00:00')); }catch(e){ return ''; }
}
function updateHijriNote(){
  const from = document.getElementById('detailDateFrom').value;
  const to = document.getElementById('detailDateTo').value;
  const note = document.getElementById('detailHijriNote');
  note.textContent = (from && to) ? `📅 هجري: من ${hijriOf(from)} إلى ${hijriOf(to)}` : '';
}

function openDetailModal(kind){
  currentDetailKind = kind;
  const cfg = DETAIL_MODAL_CONFIG[kind];
  document.getElementById('detailModalTitle').textContent = cfg.title;
  document.getElementById('detailSearchInput').value = '';
  const today = new Date();
  const weekAgo = new Date(Date.now() - 6*24*3600000);
  document.getElementById('detailDateTo').value = Utilities_formatLocalDate(today);
  document.getElementById('detailDateFrom').value = Utilities_formatLocalDate(weekAgo);
  updateHijriNote();
  document.getElementById('detailModalOverlay').classList.add('show');
  fetchAndRenderDetail();
}
function Utilities_formatLocalDate(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function closeDetailModal(){
  document.getElementById('detailModalOverlay').classList.remove('show');
}
document.getElementById('detailModalClose').addEventListener('click', closeDetailModal);
document.getElementById('detailModalClose').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); closeDetailModal(); }
});
document.getElementById('detailModalOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'detailModalOverlay') closeDetailModal();
});
document.getElementById('detailDateFrom').addEventListener('change', updateHijriNote);
document.getElementById('detailDateTo').addEventListener('change', updateHijriNote);
document.getElementById('detailApplyBtn').addEventListener('click', fetchAndRenderDetail);
document.getElementById('detailExportBtn').addEventListener('click', exportDetailCsv);

async function fetchAndRenderDetail(){
  const wrap = document.getElementById('detailTableWrap');
  wrap.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
  const search = document.getElementById('detailSearchInput').value.trim();
  const dateFrom = document.getElementById('detailDateFrom').value;
  const dateTo = document.getElementById('detailDateTo').value;

  try{
    let rows = [];
    if(currentDetailKind === 'present'){
      const res = await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getActiveUsersDetail', dateFrom, dateTo, search})});
      const data = await res.json();
      rows = (data.users||[]).map(u => ({cells:[u.name, u.phone, u.shift||'—', u.lastActivity], raw:u}));
    } else {
      const type = currentDetailKind === 'additions' ? 'إضافة_محطة_جديدة' : 'تعديل_إحداثية';
      const res = await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getChangesLog', type, dateFrom, dateTo, search, limit:500})});
      const data = await res.json();
      rows = (data.changes||[]).map(c => ({cells:[c.stationId, c.memberName, c.phone, c.shift||'—', c.date, c.time], raw:c}));
    }
    currentDetailRows = rows;
    const cfg = DETAIL_MODAL_CONFIG[currentDetailKind];
    document.getElementById('detailCountBadge').textContent = `${rows.length} نتيجة`;
    if(!rows.length){
      wrap.innerHTML = '<div class="coming-soon">لا توجد نتائج ضمن هذا النطاق</div>';
      return;
    }
    const headHtml = '<tr>' + cfg.columns.map(c=>`<th>${c}</th>`).join('') + '</tr>';
    const bodyHtml = rows.map(r => '<tr>' + r.cells.map(v => `<td dir="${/^\+?\d[\d\s]*$/.test(String(v))?'ltr':'rtl'}">${escapeHtml(v)}</td>`).join('') + '</tr>').join('');
    wrap.innerHTML = `<table>${headHtml}${bodyHtml}</table>`;
  }catch(e){
    wrap.innerHTML = '<div class="coming-soon">تعذّر تحميل التفاصيل</div>';
  }
}

/* تصدير النتائج الحالية إلى CSV — من نفس البيانات المعروضة، بدون طلب إضافي للخادم / Exports the currently displayed results to CSV — from the same rendered data, no extra server call */
function exportDetailCsv(){
  if(!currentDetailRows.length){ alert('لا توجد بيانات للتصدير'); return; }
  const cfg = DETAIL_MODAL_CONFIG[currentDetailKind];
  const lines = [cfg.columns.join(',')];
  currentDetailRows.forEach(r => lines.push(r.cells.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')));
  const csv = '\uFEFF' + lines.join('\n'); // BOM لدعم عرض العربي بشكل صحيح داخل Excel / BOM so Arabic renders correctly in Excel
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `${currentDetailKind}-${Utilities_formatLocalDate(new Date())}.csv`;
  link.click();
}

/* ===== ٢) خريطة أوقات الذروة الحرارية ===== */
async function loadPeakHeatmap(){
  peakLoaded = true;
  try{
    const res = await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getPeakHoursHeatmap'})});
    const data = await res.json();
    const maxCount = Math.max(1, ...data.matrix.flat());
    let grid = '<div class="heatmap-grid">';
    grid += '<div></div>' + Array.from({length:24}, (_,h)=> `<div style="text-align:center">${h%3===0?h:''}</div>`).join('');
    data.matrix.forEach((row, d)=>{
      grid += `<div class="heatmap-label">${data.weekdayLabels[d]}</div>`;
      row.forEach(count=>{
        const intensity = count / maxCount;
        const bg = intensity === 0 ? 'var(--bg-elev)' : `rgba(31,174,140,${0.15 + intensity*0.85})`;
        grid += `<div class="heatmap-cell" style="background:${bg}" title="${count}"></div>`;
      });
    });
    grid += '</div>';
    if(data.peak){
      grid += `<div class="heatmap-peak-note">🔥 أكثر وقت نشاطًا: <b>${data.peak.day} — الساعة ${data.peak.hour}:00</b> (${data.peak.count} حدث)</div>`;
    }
    document.getElementById('accPeakBody').innerHTML = grid;
  }catch(e){
    document.getElementById('accPeakBody').innerHTML = '<div class="coming-soon">تعذّر تحميل الخريطة</div>';
    peakLoaded = false;
  }
}

  if(fetching) return;
  fetching = true;
  lastFetch = Date.now(); // كان مفقودًا بالكامل — بدونه، فحص "مضى وقت كافٍ" يفشل دائمًا ويُعيد التحميل عند كل رجوع للتبويب مهما كان قريبًا
  document.getElementById('dataRefreshIcon').style.animation = 'spin .7s linear infinite';
  presentLoaded = false; additionsLoaded = false; editsLoaded = false; chartsLoaded = false; peakLoaded = false; regionsLoaded = false;

  try{
    const res = await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'getOperationsDashboard', phone: session.phone})});
    const data = await res.json();
    if(!data.success){ throw new Error(data.error || 'خطأ غير معروف'); }
    renderOpsMain(data);
    lastSuccessfulCheckAt = new Date();
    refreshLastUpdateLabel();
  }catch(err){
    document.getElementById('opsMain').innerHTML = `<div class="err-msg">تعذّر تحميل البيانات: ${escapeHtml(err.message)}</div>`;
  }finally{
    fetching = false;
    document.getElementById('dataRefreshIcon').style.animation = '';
  }
}

/* ===== تحديث تلقائي عند رجوع التبويب ===== */
let lastFetch = 0;
const STALE = 3 * 60 * 1000;
loadDashboard();
document.getElementById('dataRefreshBtn').addEventListener('click', async ()=>{
  lastFetch = 0;
  try{ await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'clearSearchCache', phone: session.phone})}); }catch(e){}
  loadDashboard();
});
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible' && (Date.now()-lastFetch)>STALE){ loadDashboard(); }
});
</script>
