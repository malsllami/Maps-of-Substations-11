<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | محطات التوزيع</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0D1826">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blue-deep:#1B4D8C; --blue-mid:#2E7DD1; --teal:#1FAE8C; --teal-light:#4DD6B5;
}
[data-theme="dark"]{
  --bg:#0A1420; --bg-elev:#101D2E; --bg-card:#0D1826;
  --text-primary:#EAF1F7; --text-secondary:#8FA3B8;
  --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16);
  --danger:#E0654F; --danger-bg:rgba(224,101,79,0.1);
}
[data-theme="light"]{
  --bg:#F4F8FB; --bg-elev:#FFFFFF; --bg-card:#FFFFFF;
  --text-primary:#102035; --text-secondary:#52647A;
  --border:rgba(16,32,53,0.10); --border-strong:rgba(16,32,53,0.20);
  --danger:#C8412C; --danger-bg:rgba(200,65,44,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'IBM Plex Sans Arabic',sans-serif;
  background:var(--bg); color:var(--text-primary);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:24px; transition:background .3s,color .3s;
}
.auth-card{
  width:100%; max-width:400px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:16px; padding:32px 28px;
}
.brand{display:flex; align-items:center; gap:10px; margin-bottom:28px;cursor:pointer;}
.brand-mark{height:32px;width:auto;flex-shrink:0;display:block;object-fit:contain;transition:transform .2s;}
.brand-text{font-size:15px;font-weight:700;letter-spacing:.3px;white-space:nowrap;transition:color .2s;}
.brand:hover .brand-mark{transform:scale(1.06);}
.brand:hover .brand-text{color:var(--teal);}

.contact-admin-row{display:flex;gap:10px;margin-bottom:24px;}
.contact-admin-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;
  height:44px;border-radius:11px;border:1.5px solid rgba(77,214,181,0.4);background:rgba(31,174,140,0.1);
  color:var(--teal-light);font-size:12.5px;font-weight:700;font-family:inherit;
  text-decoration:none;cursor:pointer;transition:.2s;
}
.contact-admin-btn:hover{border-color:var(--teal);background:rgba(31,174,140,0.18);}

.contact-modal-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(6,10,16,0.75);align-items:center;justify-content:center;padding:20px;overflow-y:auto;
}
.contact-modal-overlay.show{display:flex;}
.contact-modal-card{
  width:min(440px, 100%);background:var(--bg-card);border:1px solid var(--border-strong);
  border-radius:20px;padding:26px;box-shadow:0 20px 50px rgba(0,0,0,.4);max-height:90vh;overflow-y:auto;
}
.contact-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.contact-modal-header h2{font-size:17px;font-weight:800;margin:0;}
.contact-modal-header .fullpage-form-close{
  width:34px;height:34px;border-radius:50%;background:var(--bg);border:1px solid var(--border-strong);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-primary);transition:.2s;flex-shrink:0;
}
.contact-modal-header .fullpage-form-close:hover{border-color:var(--teal);color:var(--teal);}
.contact-type-btn{
  flex:1;height:42px;border-radius:10px;border:1px solid var(--border-strong);background:var(--bg);
  color:var(--text-primary);font-family:inherit;font-size:13px;cursor:pointer;transition:.2s;
}
.contact-type-btn.active{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:700;}
.contact-send-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
  height:48px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:700;
  cursor:pointer;transition:.2s;
}
.contact-send-whatsapp{background:#25D366;color:#04341c;}
.contact-send-whatsapp:hover{background:#1ebc59;}
.contact-send-email{background:#fff;color:#3c4043;border:1px solid #dadce0;}
.contact-send-email:hover{background:#f8f9fa;}
.tabs{position:relative;display:flex; background:var(--bg); border-radius:10px; padding:4px; margin-bottom:24px; border:1px solid var(--border);}
.tab-indicator{
  position:absolute;top:4px;bottom:4px;left:0;width:0;
  background:var(--bg-card);border-radius:7px;
  box-shadow:0 1px 3px rgba(0,0,0,.1);
  transition:left .32s cubic-bezier(.34,1.35,.64,1), width .32s cubic-bezier(.34,1.35,.64,1);
  z-index:0;
}
.tab{flex:1;position:relative;z-index:1; text-align:center; padding:9px; border-radius:7px; font-size:13px; cursor:pointer; color:var(--text-secondary); transition:color .2s;}
.tab.active{color:var(--text-primary); font-weight:500;}
h2{font-size:18px; font-weight:700; margin-bottom:6px;}
.desc{font-size:13px; color:var(--text-secondary); margin-bottom:22px; line-height:1.6;}
.field{margin-bottom:16px;}
.field label{display:block; font-size:12.5px; color:var(--text-secondary); margin-bottom:7px;}
.input-base{
  width:100%; height:46px; background:var(--bg); border:1px solid var(--border-strong);
  border-radius:10px; color:var(--text-primary); font-family:inherit; font-size:14px;
  padding:0 14px; outline:none; transition:border-color .2s;
}
.input-base:focus{border-color:var(--teal);}

/* ===== Floating Label ===== */
.field.floating{position:relative;margin-bottom:18px;}
.field.floating label{
  position:absolute;right:14px;top:23px;transform:translateY(-50%);
  font-size:14px;color:var(--text-secondary);margin:0;
  transition:top .18s ease,font-size .18s ease,color .18s ease;
  pointer-events:none;background:var(--bg);padding:0 4px;
  z-index:2;
}
.field.floating .input-base:focus + label,
.field.floating .input-base:not(:placeholder-shown) + label,
.field.floating .phone-unified.focused label,
.field.floating .phone-unified.filled label{
  top:0;font-size:11px;color:var(--teal);
}

/* ===== مربع الجوال الموحّد: مفتاح الدولة + خط فاصل + رقم الجوال بنفس الصندوق ===== */
.phone-unified{
  position:relative;display:flex;align-items:center;
  height:46px;background:var(--bg);border:1px solid var(--border-strong);
  border-radius:10px;transition:border-color .2s;
}
.phone-unified:focus-within{border-color:var(--teal);}
.phone-prefix{
  position:relative;display:flex;align-items:center;gap:5px;
  padding:0 12px 0 10px;height:100%;cursor:pointer;flex-shrink:0;
}
.phone-divider{width:1px;height:22px;background:var(--border-strong);flex-shrink:0;}
.phone-input-unified{
  flex:1;min-width:0;height:100%;border:none;background:transparent;outline:none;
  color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:14px;
  direction:ltr;text-align:right;padding:0 12px;
}
#phoneLabel{right:98px;}
.country-code{font-family:'JetBrains Mono',monospace; font-size:13px; direction:ltr;}
.country-dropdown{
  position:absolute; top:44px; right:-4px; width:230px; max-height:240px; overflow-y:auto;
  background:var(--bg-card); border:1px solid var(--border-strong); border-radius:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.2); z-index:20; display:none;
}
.country-dropdown.open{display:block;}
.country-option{display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; font-size:13px;}
.country-option:hover{background:var(--bg);}
.error-banner{
  background:var(--danger-bg); color:var(--danger); font-size:12.5px;
  padding:10px 12px; border-radius:8px; margin-bottom:16px; display:none; line-height:1.6;
}
.error-banner.show{display:block;}
.member-type-btn.active{border-color:var(--teal)!important;background:var(--teal)!important;color:#fff!important;font-weight:500;}

.btn-progress{
  position:relative; width:100%; height:46px; border-radius:10px; border:none;
  background:var(--teal); color:#fff; font-family:inherit; font-size:14px; font-weight:700;
  cursor:pointer; overflow:hidden; transition:opacity .2s;
}
.btn-progress:disabled{cursor:not-allowed;}
.btn-progress .label{position:relative; z-index:2; display:flex; align-items:center; justify-content:center; gap:8px; height:100%;}
.btn-progress .fill{
  position:absolute; inset:0; width:0%; background:rgba(255,255,255,0.28);
  transition:width .25s linear; z-index:1;
}
.btn-progress.error .fill{background:rgba(255,255,255,0.0);}
.btn-progress.error{background:var(--danger);}
.btn-progress .pct{font-family:'JetBrains Mono',monospace; font-size:13px;}
.btn-progress .check{display:none;}
.btn-progress.success .check{display:inline;}
.btn-progress.success .pct, .btn-progress.success .default-label{display:none;}
.ripple{
  position:absolute;border-radius:50%;background:rgba(255,255,255,0.45);
  transform:scale(0);animation:rippleAnim .6s ease-out;
  pointer-events:none;z-index:3;
}
@keyframes rippleAnim{to{transform:scale(3.2);opacity:0;}}

.fingerprint-step{display:none; text-align:center; padding:20px 0;}
.fingerprint-step.show{display:block;}
.fp-wrap{position:relative; width:96px; height:96px; margin:0 auto 18px;}
.fp-icon{
  position:relative; z-index:2;
  width:96px; height:96px; border-radius:50%;
  background: radial-gradient(circle at 35% 30%, var(--bg-elev), var(--bg-card) 70%);
  box-shadow:
    inset 0 0 0 7px var(--teal),
    inset 0 -2px 6px rgba(0,0,0,0.25),
    0 2px 8px rgba(0,0,0,0.2);
  display:flex; align-items:center; justify-content:center;
}
.fp-icon svg{stroke:var(--text-primary); opacity:0.85;}
.fp-spinner{
  position:absolute; inset:-6px; border-radius:50%; z-index:1;
  background: conic-gradient(from 0deg, transparent 0%, transparent 75%, var(--teal) 92%, transparent 100%);
  animation: fp-spin 1.1s linear infinite;
  -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px));
  mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px));
}
.fp-spinner.verifying{
  background: conic-gradient(from 0deg, transparent 0%, transparent 70%, var(--blue-mid) 92%, transparent 100%);
  animation-duration:0.7s;
}
@keyframes fp-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.fp-progress{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--teal); margin-top:-10px; margin-bottom:10px; min-height:16px;}
.fp-icon.verifying svg{opacity:1;}
.field-disabled{opacity:.5; pointer-events:none;}
.switch-link{text-align:center; margin-top:18px; font-size:13px; color:var(--text-secondary);}
.switch-link a{color:var(--teal); cursor:pointer; text-decoration:none; font-weight:500;}
</style>
</head>
<body data-theme="dark" id="bodyEl">
<script>
(function(){
  var saved = localStorage.getItem('sec-theme');
  if(saved === 'light' || saved === 'dark') document.getElementById('bodyEl').setAttribute('data-theme', saved);
})();
</script>

<div class="auth-card">
  <div class="brand" id="brandLink" role="button" tabindex="0" aria-label="الرجوع للصفحة الرئيسية">

  </div>

    <div class="field floating" id="nameField" style="display:none">
      <input type="text" class="input-base" id="nameInput" placeholder=" ">

      </div>
    </div>

    <button class="btn-progress" id="mainBtn">
      <span class="label">

  <!-- ===== خطوة البصمة ===== -->

/* ============================================================

 *  منع التكرار: disable فوري + قفل أي حقل بالنموذج
 * ============================================================ */
function ProgressButton(btnEl, labelEl, pctEl, fillEl, formFields){
  let running = false;
  return {
    async run(taskFn){
      if(running) return; // حماية إضافية من النقر المزدوج
      running = true;
      btnEl.disabled = true;
      btnEl.classList.remove('error','success');
      formFields.forEach(f=>f.classList.add('field-disabled'));
      labelEl.style.display='none';
      pctEl.style.display='inline';

      let progress = 0;
      const tick = setInterval(()=>{
        progress = Math.min(progress + Math.random()*14, 92);
        fillEl.style.width = progress+'%';
        pctEl.textContent = Math.round(progress)+'%';
      }, 120);

      try{
        const result = await taskFn();
        clearInterval(tick);
        fillEl.style.width = '100%';
        pctEl.textContent = '100%';
        await new Promise(r=>setTimeout(r,250));
        btnEl.classList.add('success');
        await new Promise(r=>setTimeout(r,500));
        return result;
      }catch(err){
        clearInterval(tick);
        btnEl.classList.add('error');
        fillEl.style.width = '0%';
        showError(err.message || 'حدث خطأ، حاول مرة أخرى');
        throw err;
      }finally{
        running = false;
        btnEl.disabled = false;
        btnEl.classList.remove('error','success');
        labelEl.style.display='inline';
        pctEl.style.display='none';
        fillEl.style.width='0%';
        formFields.forEach(f=>f.classList.remove('field-disabled'));
      }
    }
  };
}

async function callBackend(action, payload){
  const res = await fetch(API_URL, {
    method:'POST',
    body: JSON.stringify({ action, ...payload })
  });
  let json;
  try{
    json = await res.json();
  }catch(parseErr){
    // الخادم رجّع HTML بدل JSON — يحصل أحيانًا بسبب ازدحام مؤقت بجوجل نفسها، مو خطأ بكودنا

    return { success:false, error: 'تعذّر الاتصال بالخادم مؤقتًا، حاول مرة أخرى بعد قليل' };
  }
  if(json.error){
    return { success:false, error: json.error, ...json };
  }
  return { success:true, ...json };
}

/* ============================================================
 *  تحويلات base64url <-> ArrayBuffer (مطلوبة لتبادل بيانات WebAuthn)
 * ============================================================ */
function b64urlToBuffer(b64url){
  let b64 = b64url.replace(/-/g,'+').replace(/_/g,'/');
  while(b64.length % 4) b64 += '=';
  const raw = atob(b64);
  const buf = new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) buf[i] = raw.charCodeAt(i);
  return buf.buffer;
}
function bufferToB64url(buf){
  const bytes = new Uint8Array(buf);
  let str = '';
  for(let i=0;i<bytes.length;i++) str += String.fromCharCode(bytes[i]);
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

/* ============================================================
 *  WebAuthn — حماية من تكدّس الطلبات المعلّقة (AbortController)
 *  هذا تحديدًا يمنع مشكلة "تتكرر نافذة البصمة بعدد الضغطات"
 * ============================================================ */
let activeAbortController = null;
function abortPendingWebAuthn(){
  if(activeAbortController){
    activeAbortController.abort();
    activeAbortController = null;
  }
}

/* ============================================================
 *  WebAuthn — تسجيل بصمة جديدة (registration ceremony)
 * ============================================================ */
async function startWebAuthnRegistration(phone, displayName){
  document.getElementById('phoneStep').style.display='none';
  document.getElementById('fingerprintStep').classList.add('show');
  setAuthIcon();
  document.getElementById('fpTitle').textContent = 'سجّل بصمتك الآن لتأمين حسابك';
  document.getElementById('fpSubtitle').textContent = 'سيستخدم جهازك أفضل وسيلة تحقق متوفرة';
  const fpProgress = startFpProgress();

  const begin = await callBackend('generateRegisterChallenge', {phone});
  if(!begin.success) throw new Error(begin.error || 'تعذّر بدء تسجيل البصمة');

  abortPendingWebAuthn();
  activeAbortController = new AbortController();

  let credential;
  try{
    credential = await navigator.credentials.create({
      signal: activeAbortController.signal,
      publicKey: {
        challenge: b64urlToBuffer(begin.challenge),
        rp: { id: begin.rpId, name: begin.rpName },
        user: {
          id: b64urlToBuffer(begin.userIdB64),
          name: begin.userName,
          displayName: begin.userDisplayName || displayName
        },
        pubKeyCredParams: [{ type:'public-key', alg:-7 }],
        authenticatorSelection: { userVerification:'required' },
        timeout: 60000,
        attestation: 'none'
      }
    });
  }catch(err){
    throw new Error(err.name==='NotAllowedError' ? 'تم إلغاء العملية أو رفض البصمة' : 'تعذّر تسجيل البصمة على هذا الجهاز');
  }finally{
    activeAbortController = null;
  }

  document.getElementById('fpTitle').textContent = 'جاري التحقق من البصمة...';
  document.getElementById('fpIcon').classList.add('verifying');
  document.getElementById('fpSpinner').classList.add('verifying');
  const result = await callBackend('registerCredential', {
    phone,
    credentialId: bufferToB64url(credential.rawId),
    attestationObjectB64: bufferToB64url(credential.response.attestationObject),
    clientDataJSONB64: bufferToB64url(credential.response.clientDataJSON),
    deviceName: guessDeviceName()
  });
  if(!result.success){ fpProgress.fail(); throw new Error(result.error || 'فشل حفظ البصمة بالخادم'); }
  fpProgress.finish();

  saveSession(phone, result.name || displayName, result.role || 'member');
  document.getElementById('fpTitle').textContent = 'تم تسجيل البصمة بنجاح';
  return result;
}

/* ============================================================
 *  WebAuthn — الدخول ببصمة موجودة (authentication ceremony)
 * ============================================================ */
async function startWebAuthnLogin(phone){
  document.getElementById('phoneStep').style.display='none';
  document.getElementById('fingerprintStep').classList.add('show');
  setAuthIcon();
  document.getElementById('fpTitle').textContent = 'تحقق من هويتك';
  document.getElementById('fpSubtitle').textContent = 'سيستخدم جهازك أفضل وسيلة تحقق متوفرة';
  const fpProgress = startFpProgress();

  const begin = await callBackend('generateLoginChallenge', {phone});
  if(!begin.success){
    if(begin.notRegistered){
      // عضو موجود بالنظام لكن بدون بصمة مسجّلة (مثلًا عضو منقول من موقع سابق)
      // ينتقل مباشرة لتفعيل البصمة، بدون المرور بـ registerUser من جديد
      fpProgress.fail();
      document.getElementById('fpTitle').textContent = 'لا توجد بصمة مسجّلة، سيتم تفعيلها الآن';
      try{
        const result = await startWebAuthnRegistration(phone, begin.name || '');
        return result;
      }catch(regErr){
        throw regErr;
      }
    }
    throw new Error(begin.error || 'تعذّر بدء تسجيل الدخول');
  }

  abortPendingWebAuthn();
  activeAbortController = new AbortController();

  let credential;
  try{
    credential = await navigator.credentials.get({
      signal: activeAbortController.signal,
      publicKey: {
        challenge: b64urlToBuffer(begin.challenge),
        rpId: begin.rpId,
        allowCredentials: begin.allowCredentialIds.map(id => ({ type:'public-key', id: b64urlToBuffer(id) })),
        userVerification: 'required',
        timeout: 60000
      }
    });
  }catch(err){
    throw new Error(err.name==='NotAllowedError' ? 'تم إلغاء العملية أو رفض البصمة' : 'تعذّر التحقق من البصمة على هذا الجهاز');
  }finally{
    activeAbortController = null;
  }

  document.getElementById('fpTitle').textContent = 'جاري التحقق من البصمة...';
  document.getElementById('fpIcon').classList.add('verifying');
  document.getElementById('fpSpinner').classList.add('verifying');
  const result = await callBackend('verifyAssertion', {
    phone,
    credentialId: bufferToB64url(credential.rawId),
    authenticatorDataB64: bufferToB64url(credential.response.authenticatorData),
    clientDataJSONB64: bufferToB64url(credential.response.clientDataJSON),
    signatureB64: bufferToB64url(credential.response.signature)
  });
  if(!result.success){ fpProgress.fail(); throw new Error(result.error || 'فشل التحقق من تسجيل الدخول'); }
  fpProgress.finish();

  saveSession(phone, result.name, result.role || 'member');
  return result;
}

function saveSession(phone, name, role){
  localStorage.setItem('sec-phone', phone);
  localStorage.setItem('sec-session', JSON.stringify({phone, name, role, ts: Date.now()}));
}

function startFpProgress(){
  const el = document.getElementById('fpProgress');
  let p = 0;
  el.textContent = '0%';
  const timer = setInterval(()=>{
    p = Math.min(p + Math.random()*9, 94);
    el.textContent = Math.round(p) + '%';
  }, 180);
  return {
    finish(){ clearInterval(timer); el.textContent = '100%'; },
    fail(){ clearInterval(timer); el.textContent = ''; }
  };
}

function guessDeviceName(){
  const ua = navigator.userAgent;
  if(/iPhone/.test(ua)) return 'iPhone';
  if(/iPad/.test(ua)) return 'iPad';
  if(/Android/.test(ua)) return 'جهاز أندرويد';
  if(/Macintosh/.test(ua)) return 'Mac';
  if(/Windows/.test(ua)) return 'كمبيوتر ويندوز';
  return 'جهاز غير معروف';
}

function detectAuthIconType(){
  const ua = navigator.userAgent;
  if(/iPhone|iPad|iPod/.test(ua)) return 'face';       // آيفون/آيباد الحديثة أغلبها Face ID
  if(/Windows/.test(ua)) return 'windows';              // ويندوز → Windows Hello
  return 'fingerprint';                                  // أندرويد وماك → بصمة
}
function setAuthIcon(){
  document.getElementById('fpIcon').innerHTML = AUTH_ICONS[detectAuthIconType()];
}

/* ===== اقتراح آخر رقم جوال مستخدم تلقائيًا ===== */
window.addEventListener('load', ()=>{
  const saved = localStorage.getItem('sec-phone');
  if(saved){
    const match = countries.find(c => saved.startsWith(c.code));
    if(match){
      selectedCountry = match;
      document.getElementById('selectedFlag').textContent = match.flag;
      document.getElementById('selectedCode').textContent = match.code;
      phoneInput.value = stripLeadingZeros_(saved.slice(match.code.length));
      positionPhoneLabel();
      syncPhoneFloating();
    }
  }
});
